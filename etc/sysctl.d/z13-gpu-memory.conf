# z13 GPU / LLM memory tuning
# Install to: /etc/sysctl.d/z13-gpu-memory.conf
# Applied at boot by systemd-sysctl; apply live with: sysctl -p /etc/sysctl.d/z13-gpu-memory.conf

# Allow up to 500000 VMA areas per process.
# Default (65536) is too low for large GPU workloads: every amdgpu allocation
# (tensor buffer, KV-cache chunk, scratch region) consumes a kernel VMA entry.
# 96 GB VRAM in active use for LLM inference easily exceeds the default limit
# and produces opaque ENOMEM failures with no other indication of the cause.
vm.max_map_count = 500000

# Allow memory overcommit: mmap/malloc always succeed even if virtual size
# exceeds physical+swap.  GPU frameworks (ROCm, HIP, llama.cpp) routinely
# request large virtual address ranges speculatively and fill them lazily,
# so the kernel's conservative heuristic (mode 0) rejects allocations that
# would have been fine in practice.
# Trade-off: if the system genuinely exhausts physical RAM the OOM killer fires
# just as aggressively as in mode 0 — this only changes the allocation policy,
# not the kill policy.  With 30 GB system RAM (rest goes to 96 GB VRAM),
# keep an eye on RSS of non-GPU processes under heavy workloads.
vm.overcommit_memory = 1
