# Lid-switch policy for ROG Z13 GZ302EA.
#
# Lid close = plain suspend (s2idle). Brief absences should not pay the
# hibernate cost (service teardown, module unload, network restart).
#
# s2idle reliability depends on the companion fixes in this project:
#   - z13-s2idle-wakeup.service: disables spurious ACPI/USB wakeup sources
#     and sets pm_async=0 (the lid-close abort/re-enter race hung amdgpu).
#   - 50-s2idle-resume-fixup.sh: 2s pre-suspend settle so the in-flight
#     lid EC event drains before the kernel samples wakeup_count; battery
#     check on resume hibernates (with full S4 prep) at <= 10% discharging.
#
# SuspendThenHibernate is disallowed entirely (see sleep.conf.d) because
# systemd does not run the hibernate prep hooks for its S4 transition.
#
# NOTE: KDE PowerDevil overrides HandleLidSwitch when a user session is
# active. Set PowerDevil's "When laptop lid is closed" to "Sleep" in
# System Settings → Power Management (both On AC and On Battery).

[Login]
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=suspend
HandleLidSwitchDocked=ignore
