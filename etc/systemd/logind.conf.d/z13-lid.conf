# Lid-switch policy for ROG Z13 GZ302EA.
#
# Lid close = plain suspend (s2idle). Brief absences should not pay the
# hibernate cost (service teardown, module unload, network restart).
#
# s2idle reliability depends on the companion fixes in this project:
#   - z13-s2idle-wakeup.service: disables spurious ACPI/USB wakeup sources
#     and sets pm_async=0 (the lid-close abort/re-enter race hung amdgpu).
#   - 50-s2idle-resume-fixup.sh: 2s pre-suspend settle so the in-flight
#     lid EC event drains before the kernel samples wakeup_count; battery
#     check on resume hibernates (with full S4 prep) at <= 10% discharging.
#
# SuspendThenHibernate is disallowed entirely (see sleep.conf.d) because
# systemd does not run the hibernate prep hooks for its S4 transition.
#
# 2026-06-12: lid handling moved to z13-lid-watch.service (3s debounce).
# The lid on this machine is the keyboard cover; accidental close+reopen is
# a normal event, and an instant reopen aborts the s2idle entry — the
# immediate re-entry hard-wedged amdgpu even with pm_async=0 and the 2s
# settle. Debouncing at the source means no suspend ever starts for a brief
# flip, so there is nothing to race. Therefore NOBODY ELSE may act on the
# raw lid switch:
#   - logind: ignore (below; takes effect on next reboot — never restart
#     logind live)
#   - PowerDevil: "When laptop lid is closed" = "Do nothing" in System
#     Settings → Power Management (both On AC and On Battery)

[Login]
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
# Prevent logind's own idle timer from suspending the machine.  All sleep
# decisions are owned by PowerDevil (idle) or z13-lid-watch (lid close).
# Default is already 'ignore' in modern systemd but make it explicit.
IdleAction=ignore
