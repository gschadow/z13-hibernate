# Lid-switch policy for ROG Z13 GZ302EA.
#
# Use direct hibernate (S4) on lid close — NOT suspend-then-hibernate.
#
# SuspendThenHibernate was tried but is unreliable on STRIX HALO:
#   1. The s2idle spurious-wake loop (continuous CPU micro-wakes) prevents
#      the HibernateDelaySec RTC alarm from ever accumulating enough elapsed
#      time, so the machine stays in s2idle indefinitely rather than falling
#      through to S4.
#   2. After a long s2idle the amdgpu PM resume path hangs: no PM: suspend
#      exit, framebuffer frozen, all input dead — requires hard power-off.
#
# S4 resume on this machine is fast and reliable. The extra ~2 s vs s2idle
# is an acceptable trade-off for avoiding these hangs.
#
# NOTE: KDE PowerDevil overrides HandleLidSwitch when a user session is
# active. Set PowerDevil's "When laptop lid is closed" to "Hibernate" in
# System Settings → Power Management → On Battery and On AC.

[Login]
HandleLidSwitch=hibernate
HandleLidSwitchExternalPower=hibernate
HandleLidSwitchDocked=ignore
