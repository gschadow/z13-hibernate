# Lid-switch policy for ROG Z13 GZ302EA.
#
# Use suspend-then-hibernate so short lid-close is fast-resume (s2idle)
# but a forgotten-closed lid falls back to S4 after HibernateDelaySec
# (set in sleep.conf.d/z13-suspend-then-hibernate.conf).
#
# NOTE: KDE PowerDevil overrides HandleLidSwitch when a user session is
# active.  Configure PowerDevil's "When laptop lid is closed" to
# "Suspend-then-Hibernate" in System Settings → Power Management to make
# this effective for the desktop session.  The logind setting below covers
# the login screen and any seat without a KDE session.

[Login]
HandleLidSwitch=suspend-then-hibernate
HandleLidSwitchExternalPower=suspend-then-hibernate
HandleLidSwitchDocked=ignore
