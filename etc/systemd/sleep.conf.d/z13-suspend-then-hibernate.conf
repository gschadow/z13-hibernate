# SuspendThenHibernate: s2idle first (fast ~2s resume if opened soon),
# then fall back to full S4 after HibernateDelaySec.
#
# Why not disable this entirely:
#   KDE PowerDevil and UPower cannot fire their battery-critical actions
#   while frozen in s2idle. If the machine sleeps on battery and is left
#   unattended overnight, s2idle will drain the battery to zero and
#   hard-poweroff with data loss. HibernateDelaySec is the only mechanism
#   that can reach hibernate from inside s2idle.
#
# Why 2 hours (not shorter):
#   The previous 15 min was a defensive choice made before the s2idle
#   spurious-wake loop was fixed. Now that s2idle is reliable, a shorter
#   fallback is unnecessary. 2 hours covers any normal work absence
#   without triggering the disruptive hibernate path.
#
# On AC this setting is largely moot (no battery risk), but harmless.

[Sleep]
AllowSuspendThenHibernate=yes
HibernateDelaySec=2h
