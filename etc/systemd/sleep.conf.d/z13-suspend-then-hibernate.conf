# SuspendThenHibernate is DISALLOWED on this machine.
#
# Why: systemd runs the system-sleep hooks exactly once for the whole
# suspend-then-hibernate operation, with argument "suspend-then-hibernate",
# *before* the s2idle phase. When the RTC alarm later transitions s2idle
# into S4, the hibernate prep hooks (mt7925e unload, compositor gating,
# VBox suspend — see 05-hibernate-hook.sh) DO NOT run. Hibernating without
# that prep is exactly the firmware-timeout hang this project exists to fix.
# Disallowing it here makes logind report CanSuspendThenHibernate=no, so
# PowerDevil cannot take this path either.
#
# Replacement battery safety net: 50-s2idle-resume-fixup.sh checks battery
# on every s2idle resume and triggers a proper hibernate (with full S4 prep)
# when discharging at <= 10%. Residual risk: a machine left asleep on
# battery for a very long time can still drain before anyone wakes it.
#
# Intended sleep policy:
#   - lid close / idle timeout  -> plain suspend (s2idle)
#   - battery critical / manual -> hibernate (runs full prep via hooks)

[Sleep]
AllowSuspendThenHibernate=no
