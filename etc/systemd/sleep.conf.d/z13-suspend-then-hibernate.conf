# SuspendThenHibernate: s2idle first (fast ~2s resume if opened soon),
# then fall back to full S4 after HibernateDelaySec.
#
# This protects against two failure modes on the ROG Z13 GZ302EA:
#   1. Battery drain: s2idle has no true S3 on this platform; UMA memory with
#      128 GB keeps the SoC alive.  On AC this is moot but battery sleep overnight
#      would drain completely without the S4 fallback.
#   2. ASUS EC AC-status bug: after a long s2idle the EC can briefly (or
#      permanently) misreport AC as disconnected.  UPower may then fire
#      CriticalPowerAction, causing a hard reset mid-resume.  Falling through to
#      S4 before that window is reached avoids the race entirely.
#
# The gate hook (z13-hibernate-gate.service) runs as usual on the S4 leg,
# so all GPU quiesce, compositor suspend, and KWin resume logic still applies.

[Sleep]
AllowSuspendThenHibernate=yes
# 15 min gives a comfortable quick-resume window while keeping S4 reachable
# before either the battery risk or the EC-bug window opens.
HibernateDelaySec=15min
